name: weekly-report

on:
  schedule:
    # 13:00 UTC every Saturday (~09:00 ET) — Friday's weekly close is final by then.
    - cron: "0 13 * * 6"
  workflow_dispatch:
    inputs:
      week_ending:
        description: "Optional ISO date (YYYY-MM-DD) to (re)generate a specific week."
        required: false
        type: string

permissions:
  contents: write

jobs:
  report:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install
        run: python -m pip install -e .

      - name: Generate weekly report (cross-validated)
        run: |
          WEEK_ARG=""
          if [ -n "${{ github.event.inputs.week_ending }}" ]; then
            WEEK_ARG="--week-ending ${{ github.event.inputs.week_ending }}"
          fi
          PYTHONPATH=src python -m market_tracking.cli report \
            $WEEK_ARG \
            --output-dir reports/weekly \
            --history reports/history.csv \
            --strict

      - name: Commit report if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add reports/weekly reports/history.csv
          if git diff --staged --quiet; then
            echo "No report changes to commit."
          else
            git commit -m "chore: weekly market report $(date -u +%Y-%m-%d)"
            git push
          fi
